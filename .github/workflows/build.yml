name: Build desktop app

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: python -m pip install --upgrade pip -r requirements.txt pyinstaller

      - name: Generate icon
        run: python make_icon.py

      - name: Build Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\build_windows.ps1

      - name: Build macOS
        if: runner.os == 'macOS'
        shell: bash
        run: chmod +x ./build_macos.sh && ./build_macos.sh

      - name: Build Linux
        if: runner.os == 'Linux'
        shell: bash
        run: chmod +x ./build_linux.sh && ./build_linux.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SendMailOutreach-${{ runner.os }}
          path: dist/**
